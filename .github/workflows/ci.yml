name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
            11.0.100-preview.5.26302.115
          global-json-file: global.json

      - name: Restore
        run: dotnet restore YTLiveChat.sln

      - name: Build
        run: dotnet build YTLiveChat.sln -c Release --no-restore

      - name: Test (net8.0)
        run: dotnet test --project YTLiveChat.Tests/YTLiveChat.Tests.csproj -c Release --framework net8.0 --no-build

      - name: Test (net10.0)
        run: dotnet test --project YTLiveChat.Tests/YTLiveChat.Tests.csproj -c Release --framework net10.0 --no-build
